<html lang="cn">
<title>
    添加
</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<body>
<form action="/add" method="post">
    <div class="mb-3">
        <label for="core-title" class="form-label">Email address</label>
        <input type="email" name="title" class="form-control" id="core-title" placeholder="">
    </div>
    <div class="row">
        <div class="col">
            <label for="core-content" class="form-label">Example textarea</label>
            <textarea name="code" class="form-control" id="core-content" rows="3" ></textarea>
        </div>
        <div class="col">
            <label>Preview</label>
            <div id="preview" style="border: aquamarine 1px solid"></div>
        </div>
    </div>


    <input type="submit" class="btn btn-primary">
</form>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    let preview=document.getElementById("preview")
    document.getElementById("core-content").onkeyup=function (){
        console.log(this.value)
        preview.innerHTML=marked(this.value)
    }
</script>
</body>
</html>
