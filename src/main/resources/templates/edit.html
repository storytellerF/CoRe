<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>edit</title>
</head>
<body>
<form action="/edit" method="post">
    <input type="hidden" name="id" th:value="${item.id}">
    <label>
        <input name="title" th:value="${item.title}">
    </label>
    <br>
    <label>
        <textarea name="codeContent" th:text="${item.codeContent}"></textarea>
    </label>
    <br>
    <button>edit</button>
</form>
</body>
</html>
